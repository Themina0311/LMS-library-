<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Registration | University of Colombo</title>
    <!-- Link to Google Fonts for Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="loginbox">
        <form action="user_registtion.php" method="post">
            <h2>Library Registration</h2>
            
            <!-- First Name -->
            <div class="inputbox">
                <input type="text" required name="fname">
                <label>First Name</label>
            </div>

            <!-- Last Name -->
            <div class="inputbox" >
                <input type="text" required name="lname">
                <label>Last Name</label>
            </div>

            <!-- Index Number -->
            <div class="inputbox">
                <input type="text" required name="indexno">
                <label>Index Number</label>
            </div>

            <!-- Address -->
            <div class="inputbox">
                <input type="text" required name="address">
                <label>Address</label>
            </div>

            <!-- Contact Number -->
            <div class="inputbox">
                <input type="tel" required name="telno">
                <label>Contact Number</label>
            </div>

            <!-- Email -->
            <div class="inputbox">
                <input type="email" required name="email">
                <label>Email</label>
            </div>

            <!-- Password -->
            <div class="inputbox">
                <input type="password" required name="password">
                <label>Password</label>
            </div>

            <button type="submit">Register</button>
        </form>
    </div>
</body>
</html>
